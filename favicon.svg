<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Iterable Community Docs">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1d27; }
        .envelope { fill: #22253a; stroke: #5b6af8; }
        .flap { fill: #2a2d40; stroke: #5b6af8; }
        .person { fill: #5b6af8; }
        .person-dim { fill: #5b6af8; opacity: 0.45; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #eef0ff; }
        .envelope { fill: #ffffff; stroke: #5b6af8; }
        .flap { fill: #e8eaff; stroke: #5b6af8; }
        .person { fill: #5b6af8; }
        .person-dim { fill: #5b6af8; opacity: 0.35; }
      }
    </style>
  </defs>

  <!-- Background pill -->
  <rect width="32" height="32" rx="7" class="bg"/>

  <!-- Envelope body -->
  <rect x="3" y="10" width="26" height="17" rx="2" class="envelope" stroke-width="1.3" fill="#22253a"/>

  <!-- Envelope flap (open/folded down) -->
  <path d="M3 10 L16 19 L29 10" fill="none" stroke="#5b6af8" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Three people standing in the envelope -->
  <!-- Center person (tallest / brightest) -->
  <circle cx="16" cy="17.5" r="2.2" class="person"/>
  <path d="M11.8 26 Q12.5 22 16 22 Q19.5 22 20.2 26" class="person" stroke="none" fill="#5b6af8"/>

  <!-- Left person (shorter, dimmer) -->
  <circle cx="10" cy="18.5" r="1.7" class="person-dim"/>
  <path d="M6.8 26 Q7.3 23 10 23 Q12.7 23 13.2 26" class="person-dim" stroke="none"/>

  <!-- Right person (shorter, dimmer) -->
  <circle cx="22" cy="18.5" r="1.7" class="person-dim"/>
  <path d="M18.8 26 Q19.3 23 22 23 Q24.7 23 25.2 26" class="person-dim" stroke="none"/>

  <!-- Clip overflow below envelope -->
  <rect x="3" y="27" width="26" height="1" fill="#1a1d27"/>
</svg>