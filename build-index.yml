name: Build Snippet Index

on:
  push:
    branches: [main]
    paths:
      - 'snippets/**/*.md'
      - 'guides/**/*.md'
      - 'tips/**/*.md'
      - 'bugs/**/*.md'
      - 'scripts/**/*.md'
      - 'build-index.js'

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build index.json
        run: node build-index.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet -- '*/index.json' && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated indexes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add */index.json
          git commit -m "chore: auto-update content indexes"
          git push
